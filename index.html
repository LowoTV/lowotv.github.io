<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beast Handler Merge Calculator</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background-color: #1e1e2e;
            color: #f8f8f2;
            margin-top: 50px;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin: 10px 0;
        }
        select, input, button {
            margin: 10px;
            padding: 12px;
            font-size: 1em;
            border-radius: 8px;
            border: none;
            outline: none;
        }
        select, input {
            background-color: #282a36;
            color: #f8f8f2;
        }
        select {
            appearance: none;
            padding: 12px 20px;
            border: 2px solid #ff79c6;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        select:hover {
            border-color: #bd93f9;
        }
        button {
            background-color: #ff79c6;
            color: #1e1e2e;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #bd93f9;
        }
        #results {
            margin-top: 20px;
            font-weight: bold;
        }
        .out-of-bounds {
            color: red;
        }
        .upgrade-icon {
            width: 100px;
            height: 100px;
            display: block;
            margin: 10px auto;
            filter: grayscale(100%);
        }
        .active {
            filter: none;
        }
        .copyright {
            position: fixed;
            bottom: 5px;
            right: 10px;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>Beast Handler Merge Calculator</h1>
    <p>Select Path:</p>
    <select id="pathSelect" onchange="updateUpgradeIcon()">
        <option value="top">Top Path (WIP)</option>
        <option value="middle" selected>Middle Path</option>
        <option value="bottom">Bottom Path (WIP)</option>
    </select>
    
    <p>Select Tier:</p>
    <select id="tierSelect" onchange="checkPowerBounds(); updateUpgradeIcon();">
        <option value="1">Tier 1 (WIP)</option>
        <option value="2">Tier 2 (WIP)</option>
        <option value="3" selected>Tier 3</option>
        <option value="4">Tier 4</option>
        <option value="5">Tier 5</option>
    </select>

    <img id="upgradeIcon" class="upgrade-icon" src="" alt="Upgrade Icon">

    <p id="powerLabel">Enter Current Power:</p>
    <input type="number" id="powerInput" value="8" step="1" oninput="checkPowerBounds()">
    <br>
    <button onclick="calculateStats()">Calculate</button>
    <p id="results"></p>
    
    <div class="copyright">© 2025 Beast Handler Calculator | LowoTV</div>
    
    <script>
        function updateUpgradeIcon() {
            let path = document.getElementById("pathSelect").value;
            let tier = document.getElementById("tierSelect").value;
            let iconPath = `icons/${tier}-BeastHandler.png`;
            let img = document.getElementById("upgradeIcon");
            
            if (tier === '1' || tier === '2' || path === 'top' || path === 'bottom') {
                img.classList.remove("active");
            } else {
                img.classList.add("active");
            }
            
            img.src = iconPath;
        }
    </script>
</body>
</html>
