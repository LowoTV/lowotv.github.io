<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beast Handler Merge Calculator</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background-color: #1e1e2e;
            color: #f8f8f2;
            margin-top: 50px;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin: 10px 0;
        }
        select, input, button {
            margin: 10px;
            padding: 12px;
            font-size: 1em;
            border-radius: 8px;
            border: none;
            outline: none;
        }
        select, input {
            background-color: #282a36;
            color: #f8f8f2;
        }
        select {
            appearance: none;
            padding: 12px 20px;
            border: 2px solid #ff79c6;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        select:hover {
            border-color: #bd93f9;
        }
        button {
            background-color: #ff79c6;
            color: #1e1e2e;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #bd93f9;
        }
        #results {
            margin-top: 20px;
            font-weight: bold;
        }
        .settings-icon {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 1.5em;
            color: black;
            cursor: pointer;
            transition: 0.3s;
        }
        .settings-icon:hover {
            color: #bd93f9;
        }
        .settings-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #282a36;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1001;
        }
        .copyright {
            position: fixed;
            bottom: 5px;
            right: 10px;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>Beast Handler Merge Calculator</h1>
    <p>Select Path:</p>
    <select id="pathSelect" onchange="updateTierOptions()">
        <option value="top">Top Path (WIP)</option>
        <option value="middle" selected>Middle Path</option>
        <option value="bottom">Bottom Path (WIP)</option>
    </select>
    
    <p>Select Tier:</p>
    <select id="tierSelect" onchange="updatePowerLimits()">
        <option value="1">Tier 1 (WIP)</option>
        <option value="2">Tier 2 (WIP)</option>
        <option value="3" selected>Tier 3</option>
        <option value="4">Tier 4</option>
        <option value="5">Tier 5 (WIP)</option>
    </select>
    
    <p>Enter Current Power:</p>
    <input type="number" id="powerInput" value="8" step="1">
    <br>
    <button onclick="calculateStats()">Calculate</button>
    <p id="results"></p>
    
    <div class="settings-icon" onclick="toggleSettings()">⚙️</div>
    <div class="copyright">© 2025 Beast Handler Calculator | LowoTV</div>
    
    <script>
        function calculateStats() {
            let power = parseFloat(document.getElementById('powerInput').value);
            let tier = document.getElementById('tierSelect').value;
            let minPower = tier === '3' ? 8 : 16;
            let maxPower = tier === '3' ? 24 : 64;
            let percent = (power - minPower) / (maxPower - minPower);

            let basePierce = tier === '3' ? 14 : 22;
            let maxPierce = tier === '3' ? 35 : 55;
            let baseDamage = tier === '3' ? 9 : 30;
            let maxDamage = tier === '3' ? 27 : 82;
            let baseCooldown = 1, maxCooldown = 0.6561;
            let baseStunBonus = tier === '3' ? 3 : 8;
            let maxStunBonus = tier === '3' ? 9 : 25;
            
            let pierce = Math.floor(basePierce + (maxPierce - basePierce) * percent);
            let damage = Math.floor(baseDamage + (maxDamage - baseDamage) * percent);
            let cooldown = baseCooldown - ((baseCooldown - maxCooldown) * percent);
            let stunBonusDamage = Math.floor(baseStunBonus + (maxStunBonus - baseStunBonus) * percent);
            
            let resultText = `Pierce: ${pierce} <br> Damage: ${damage} <br> Attack Cooldown: ${cooldown.toFixed(4)}s <br> Bonus Stun Damage: ${stunBonusDamage}`;
            
            if (tier === '4') {
                let abilityPierce = Math.floor(400 + (433 - 400) * percent);
                let abilityDamage = Math.floor(150 + (202 - 150) * percent);
                let abilityCooldown = 35 - (0.3439 * percent);
                resultText += `<br><br> Ability Pierce: ${abilityPierce} <br> Ability Damage: ${abilityDamage} <br> Ability Cooldown: ${abilityCooldown.toFixed(4)}s`;
            }
            
            document.getElementById('results').innerHTML = resultText;
        }
    </script>
</body>
</html>
